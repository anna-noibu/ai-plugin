name: Release Plugin

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0"
          else
            # Strip leading v, split on dots, bump patch
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "version=${NEXT#v}" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Stamp version into plugin.json
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' \
            src/.claude-plugin/plugin.json > tmp.json && mv tmp.json src/.claude-plugin/plugin.json

      - name: Package plugin
        run: |
          mkdir -p dist
          cd src && zip -r ../dist/noibu.zip .claude-plugin .mcp.json skills -x '*.DS_Store'

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" dist/noibu.zip \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

      - name: Mirror to private sync repo
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SYNC_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git remote add private git@github.com:Noibu/ai-plugin-sync.git
          git push private HEAD:main --force

